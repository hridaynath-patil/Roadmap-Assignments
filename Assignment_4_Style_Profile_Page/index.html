<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styled Profile Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main class="card-container">
        <div class="profile-card">
            
            <div class="card-header">
                <div class="image-wrapper">
                    <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&q=80&w=200&h=200" alt="Jane Doe" class="profile-img">
                </div>
                <h1 class="name">Jane Doe</h1>
                <p class="role">Lead UX Engineer</p>
            </div>

            <div class="card-body">
                <section class="about-section">
                    <h2>About Me</h2>
                    <p>Transforming complex problems into elegant, intuitive, and accessible designs. With over 5 years of experience bridging the gap between design and front-end engineering.</p>
                </section>

                <section class="skills-section">
                    <h2>Core Skills</h2>
                    <div class="badges">
                        <span class="badge badge-primary">Figma</span>
                        <span class="badge badge-secondary">CSS Architecture</span>
                        <span class="badge badge-accent">React</span>
                        <span class="badge badge-primary">Prototyping</span>
                    </div>
                </section>
            </div>

            <div class="card-footer">
                <div class="contact-methods">
                    <a href="mailto:jane@example.com" class="btn btn-outline">Email Me</a>
                    <a href="#" class="btn btn-solid">View Portfolio</a>
                </div>
                <div class="social-links">
                    <a href="#" class="social-icon">IN</a>
                    <a href="#" class="social-icon">GH</a>
                    <a href="#" class="social-icon">TW</a>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
