<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 12 | Notes App</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-wrapper">
        <header class="navbar">
            <div class="logo">
                <i class="fas fa-sticky-note"></i>
                <h1>My Notes</h1>
            </div>
            <button id="add-note-btn" class="add-note-btn">
                <i class="fas fa-plus"></i> New Note
            </button>
        </header>

        <main class="notes-container" id="notes-container">
            <!-- Notes will be dynamically injected here -->
        </main>
        
        <!-- Empty State (hidden by default if there are notes) -->
        <div id="empty-state" class="empty-state">
            <i class="far fa-clipboard"></i>
            <h2>No notes yet</h2>
            <p>Click the "New Note" button to create your first note.</p>
        </div>
    </div>

    <!-- Go Back Link -->
    <a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Main Menu</a>

    <script src="script.js"></script>
</body>
</html>
