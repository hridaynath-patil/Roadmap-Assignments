<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 15 | TypeScript To-Do App</title>
    <meta name="description" content="A To-Do app rebuilt in TypeScript demonstrating types, interfaces, generics, and type-safe functions.">
    <link rel="stylesheet" href="styles.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Back Link -->
    <a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Main Menu</a>

    <!-- TS Badge -->
    <div class="ts-badge"><span>TS</span></div>

    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <h1>My Tasks</h1>
                <p>Powered by TypeScript · Stay productive.</p>
            </div>
        </header>

        <!-- Add Task Form -->
        <form id="todo-form" class="todo-form">
            <input
                type="text"
                id="todo-input"
                class="todo-input"
                placeholder="What do you need to do?"
                autocomplete="off"
                required
            >
            <select id="priority-select" class="priority-select" aria-label="Priority">
                <option value="medium">Medium</option>
                <option value="low">Low</option>
                <option value="high">High</option>
            </select>
            <button type="submit" class="add-btn" aria-label="Add task">
                <i class="fas fa-plus"></i>
            </button>
        </form>

        <!-- Filter Controls -->
        <div class="filter-controls">
            <span class="active" data-filter="all">All</span>
            <span data-filter="pending">Pending</span>
            <span data-filter="completed">Completed</span>
        </div>

        <!-- Task List -->
        <ul id="todo-list" class="todo-list"></ul>

        <!-- Footer -->
        <div class="app-footer">
            <span id="task-count">0 tasks total</span>
            <button id="clear-completed" class="clear-btn">Clear Completed</button>
        </div>
    </div>

    <!-- Compiled TypeScript output -->
    <script type="module" src="dist/app.js"></script>
</body>
</html>
