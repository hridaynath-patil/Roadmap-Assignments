<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="weather-container">
        <h1>Weather App</h1>
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name..." autocomplete="off">
            <button id="searchBtn">Search</button>
        </div>
        <div id="loading" class="hidden">Fetching weather data...</div>
        <div id="errorMsg" class="hidden error"></div>
        <div id="weatherResult" class="hidden">
            <h2 id="cityName"></h2>
            <div id="weatherIcon" class="weather-icon"></div>
            <div id="temperature"></div>
            <div id="weatherDesc"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
