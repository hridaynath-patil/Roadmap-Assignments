<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 16 | User Management App</title>
    <meta name="description" content="A TypeScript User Management App demonstrating interfaces, generics, type-safe CRUD operations, filtering, and sorting.">
    <link rel="stylesheet" href="styles.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Back Link -->
    <a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Main Menu</a>

    <!-- TS Badge -->
    <div class="ts-badge"><span>TS</span></div>

    <div class="page-layout">

        <!-- ── Sidebar / Add User Form ─────────────────────── -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>User Management</h1>
                <p class="subtitle">TypeScript-powered</p>
            </div>

            <form id="user-form" class="user-form" novalidate>
                <h2 class="form-title"><i class="fas fa-user-plus"></i> Add New User</h2>

                <div class="form-group">
                    <label for="name-input">Full Name</label>
                    <input
                        type="text"
                        id="name-input"
                        placeholder="e.g. Jane Doe"
                        autocomplete="off"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email-input">Email Address</label>
                    <input
                        type="email"
                        id="email-input"
                        placeholder="e.g. jane@example.com"
                        autocomplete="off"
                        required
                    >
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="role-select">Role</label>
                        <select id="role-select">
                            <option value="viewer">Viewer</option>
                            <option value="editor">Editor</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="dept-select">Department</label>
                        <select id="dept-select">
                            <option value="Engineering">Engineering</option>
                            <option value="Design">Design</option>
                            <option value="Marketing">Marketing</option>
                            <option value="HR">HR</option>
                            <option value="Finance">Finance</option>
                        </select>
                    </div>
                </div>

                <p id="form-error" class="form-error" style="display:none;"></p>

                <button type="submit" class="submit-btn" id="add-user-btn">
                    <i class="fas fa-plus"></i> Add User
                </button>
            </form>

            <!-- TS Topics legend -->
            <div class="ts-topics">
                <p class="topics-label">TypeScript Concepts Used</p>
                <div class="topic-tags">
                    <span class="topic-tag">Types</span>
                    <span class="topic-tag">Interfaces</span>
                    <span class="topic-tag">Generics</span>
                    <span class="topic-tag">Arrays</span>
                    <span class="topic-tag">Objects</span>
                    <span class="topic-tag">Functions</span>
                </div>
            </div>
        </aside>

        <!-- ── Main Panel ──────────────────────────────────── -->
        <main class="main-panel">

            <!-- Toolbar -->
            <div class="toolbar">
                <div class="toolbar-left">
                    <h2>All Users <span id="user-count" class="count-badge">0</span></h2>
                </div>
                <div class="toolbar-right">
                    <div class="search-wrap">
                        <i class="fas fa-search"></i>
                        <input
                            type="text"
                            id="search-input"
                            placeholder="Search users…"
                            aria-label="Search users"
                        >
                    </div>
                    <select id="filter-role" aria-label="Filter by role">
                        <option value="all">All Roles</option>
                        <option value="admin">Admin</option>
                        <option value="editor">Editor</option>
                        <option value="viewer">Viewer</option>
                    </select>
                    <select id="sort-select" aria-label="Sort users">
                        <option value="name">Sort: Name</option>
                        <option value="email">Sort: Email</option>
                        <option value="role">Sort: Role</option>
                        <option value="department">Sort: Dept.</option>
                    </select>
                </div>
            </div>

            <!-- User Grid -->
            <div id="user-grid" class="user-grid"></div>

            <!-- Empty State -->
            <div id="empty-state" class="empty-state" style="display:none;">
                <i class="fas fa-users-slash"></i>
                <p>No users match your search.</p>
            </div>
        </main>
    </div>

    <!-- Compiled TypeScript -->
    <script type="module" src="dist/app.js"></script>
</body>
</html>
