<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 11 | To-Do List App</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <h1>My Tasks</h1>
            <p>Stay productive and focused.</p>
        </header>

        <form id="todo-form" class="todo-form">
            <input type="text" id="todo-input" class="todo-input" placeholder="What do you need to do?" autocomplete="off">
            <button type="submit" class="add-btn">
                <i class="fas fa-plus"></i>
            </button>
        </form>

        <div class="filter-controls">
            <span class="active" data-filter="all">All</span>
            <span data-filter="pending">Pending</span>
            <span data-filter="completed">Completed</span>
        </div>

        <ul id="todo-list" class="todo-list">
            <!-- Tasks will be dynamically injected here by JS -->
        </ul>

        <div class="app-footer">
            <span id="task-count">0 tasks total</span>
            <button id="clear-completed" class="clear-btn">Clear Completed</button>
        </div>
    </div>

    <!-- Go Back Link -->
    <a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Main Menu</a>

    <script src="script.js"></script>
</body>
</html>
